<h1>TeamCombs</h1>
<div class="combs">
  <div class="comb" *ngFor="let teamComb of items()">
    <p><strong>Top:</strong> {{ teamComb.Top }}</p>
    <p><strong>Jungle:</strong> {{ teamComb.Jungle }}</p>
    <p><strong>Mid:</strong> {{ teamComb.Mid }}</p>
    <p><strong>ADC:</strong> {{ teamComb.ADC }}</p>
    <p><strong>Support:</strong> {{ teamComb.Support }}</p>
  </div>
</div>
